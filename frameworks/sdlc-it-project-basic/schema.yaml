# ╔════════════════════════════════════════════════════════════════════════╗
# ║  HOW TO READ THIS SCHEMA — do not delete (LLM + humans rely on it)        ║
# ╚════════════════════════════════════════════════════════════════════════╝
#
# Root sections:
#   rules:    cross-cutting contracts every file / index satisfies.
#   root:     the .llm/ node tree. `root` is the top node; its children
#             (intake, plans, …) are the pillars. Every node shares one shape
#             { path?, frontmatter?, tags?, entities? } and nests recursively.
#   meta:     framework metadata + this project's component registry.
#
# frontmatter:  a list of frontmatter keys. Suffix `!` = required, no suffix =
#               optional.  e.g. [key!, type, status!] → key & status required.
#               `human_revised` is universal (rules.markdown) — never repeated.
#
# tags:  marker blocks `<!-- llm:NAME --> ... <!-- /llm:NAME -->`. The marker
#        NAME is the path through the node tree, colon-joined: a node's index
#        tag is just its key (-> llm:intake); a tag deeper in the tree joins the
#        ancestor keys (-> llm:plans:plan:handoff:files).
#
#        Every tag definition is an OBJECT — sub-keys declare the block shape:
#          columns: [...]        → markdown table (items = column headers; `!`
#                                  marks a required column; LLM-diffable rows).
#          description: "..."    → free prose; content must stay related to it.
#          format: path-list     → bullet list of repo-relative `paths`.
#          format: yaml-list     → inline yaml list (used inside non-md files).
#          host_file: <path|*>   → explicit host (only needed for tags outside
#                                  the node tree, e.g. meta.tags. Node index tags
#                                  derive host_file from the path automatically).
#          number: <int|float>   → single scalar value (the number is the seed).
#
# path:  see the `root` section below — RELATIVE to the parent node; implicit =
#        the node's key; a directory path resolves to that dir's index.md.

version: 3
flavor: sdlc-it-project-basic
flavor: sdlc-it-project-basic   # self-identifying so doctor/sync can detect the installed flavor

# ─────────────────────────────────────────────────────────────────────────
# rules — cross-cutting, not specific to any single pillar.
# ─────────────────────────────────────────────────────────────────────────
rules:
  # Every markdown file: at least one H1, and `human_revised` in frontmatter
  # (defaults to false; flip to true after a human reads it end-to-end).
  markdown:
    required_heading: h1
    frontmatter: [human_revised!]

  # Every index.md carries these (in addition to the markdown rule above).
  index_md:
    frontmatter: [generated!, apps!]

  # Every pillar's shallow index.md (the generated one) carries these.
  # Pillar-specific extras go in that node's frontmatter (e.g. intake adds tracker).
  pillar_index:
    frontmatter: [generated!, generated-at!, apps!]   # generated: true; apps: [meta]
    # No `count`: the table's row count IS the count; a separate field is redundant.

  # Soft rule — warning only, never fails validation. Bullet items under the
  # named acceptance/requirement sections should match the EARS pattern;
  # free prose elsewhere is fine.
  ears:
    severity: warning
    pattern: "WHEN .+ THE SYSTEM SHALL .+"
    applies_to:
      - intake tickets — "## Acceptance Criteria (EARS)"
      - slug-based plans — "## Acceptance Criteria (EARS)"
      - specs — "## Requirements (EARS)"

# ─────────────────────────────────────────────────────────────────────────
# root — the .llm/ tree. `root` is the top node; its children (intake, plans, …)
# are the pillars. EVERY node — root and every descendant — shares one shape:
#   path        the node's dir/file, RELATIVE to its parent. Implicit = the key;
#               explicit only when the segment differs (e.g. <KEY>, t<N>.md).
#               Ends in a directory → the node's file is that dir's index.md.
#   frontmatter the index.md frontmatter of THIS node (beyond the rules.* baseline).
#   tags        marker blocks in THIS node's index.md (array=table, string=prose, …).
#   entities    child nodes (recursive, same shape) — the files/dirs inside.
# The parser is a single recursion. `root` lists all four (even when empty) as
# the reference; children list only what they use.
# ─────────────────────────────────────────────────────────────────────────
root:
  # The .llm/ root. index.md = .llm/index.md (static, generated: false). Carries
  # framework-version plus the project-owned components/root marker blocks.
  path:                              # implicit — the .llm/ root itself
  frontmatter: [framework-version!]  # generated/apps come from rules.index_md
  tags:
    components: {columns: [Key, Folder, Stack/Notes]}
    root: {description: "project context / orientation prose"}
  entities:
    intake:
      # Tracker-agnostic mirror. `tracker:` on intake/index.md is a LIST of
      # trackers this project pulls from (typically one — e.g. [jira] — but a
      # project crossing trackers can list multiple, e.g. [jira, linear]). Each
      # item then records its OWN tracker (scalar) in its frontmatter, so the
      # source of every <KEY> is unambiguous. plans/ and archive/ don't carry
      # tracker — they link to intake via `key` and the tracker is known there.
      frontmatter: [tracker!]
      tags:
        # The index table is what enters context by default — carry only what
        # orients a decision. synced-at lives in each item's frontmatter.
        intake: {columns: [Key, Type, Title, Status, Relates]}
      entities:
        item:
          # Flat: every intake item is a sibling — no enforced hierarchy. `type`
          # is the tracker issuetype (epic | story | task | bug | …); teams that
          # skip a level simply never create items of that type. `tracker`
          # records which tracker this item came from (must be one of the values
          # listed in intake/index.md's tracker list). `relates` links items
          # many-to-many and non-blocking (other <KEY>s) — distinct from the
          # blocking `depends-on` in plans/specs.
          path: <KEY>
          frontmatter: [generated!, key!, type!, tracker!, status!, synced-at!, apps!, relates]

    plans:
      tags:
        # Lean index — dropped Scope (too detailed for a scan) and Status (plans/
        # holds only active plans; done ones live in archive). Tasks hints size.
        plans: {columns: [Key, Title, Tasks, Apps]}
      entities:
        plan:
          # key optional: slug-based plans (maintenance-<slug>) have no tracker id.
          path: <PLAN-ID>
          frontmatter: [generated!, scope!, status!, summary!, apps!, key, type, epic, story, aux]
          entities:
            # task, handoff, delta_draft live at the same level inside the plan dir.
            task:
              path: t<N>.md
              frontmatter: [plan!, task!, depends-on!, concerns!, files!, status!, apps!, aux!]
            handoff:
              path: handoff-t<N>.md
              frontmatter: [plan!, task!, status!, date!]
              tags:
                files: {format: path-list}   # path-list block of files touched
            delta_draft:
              path: delta-draft.md
              frontmatter: [plan!, status!, date!]   # status: always draft

    archive:
      tags:
        # Lean index — dropped Story/Epic (drill in) and Completed (timestamp).
        # Absorbed-in: <commit-sha> records the absorption commit; populated in
        # archive flow Phase 4. Rows pre-migration may have it empty (in-flight)
        # or absent (legacy); both states are tolerated by doctor.
        archive: {columns: [Key, Type, Apps, Summary, Absorbed-in]}
      entities:
        plan:
          # An archived plan IS the plan's index.md: the archive flow copies it,
          # forces status: done, and adds completed-at + delta. Inherits the
          # plan's frontmatter (scope, type, epic, story, key, aux).
          #
          # The archive plan directory is EPHEMERAL: created in archive flow
          # Phase 1, pruned in Phase 4 after spec absorption. Only the row in
          # archive/index.md (with Absorbed-in: <sha>) survives. The `delta`
          # frontmatter is optional because it's only meaningful while the
          # directory exists.
          path: <PLAN-ID>
          frontmatter: [generated!, scope!, status!, summary!, apps!, completed-at!, delta, key, type, epic, story, aux]
          entities:
            delta:
              path: delta.md
              frontmatter: [plan!, date!, apps]

    specs:
      # An `area` may nest child `area`s to arbitrary depth (recursive).
      # depends-on = hard, blocking prerequisites (load them WITH this area);
      # relates = soft, non-blocking cross-links (mirrors intake's relates). The
      # index surfaces both so the LLM can tree-shake: pull the required closure
      # (depends-on), then weigh the related set (relates) before loading more.
      # deltas / consolidated-at are alternative states: an area lists the plan
      # IDs whose deltas built it, until `specs consolidate` compacts them into a
      # single consolidated-at date.
      tags:
        specs: {columns: [Path, Summary, Apps, Depends-on, Relates]}
      entities:
        area:
          path: <area>
          frontmatter: [generated!, name!, summary!, depends-on!, relates, apps!, deltas, consolidated-at]
          entities:
            concern:
              path: <concern>.md
              frontmatter: [generated!, name!, summary!, depends-on!, relates, apps!, deltas, consolidated-at]
            # an area may also nest child areas here (same shape as `area`).

    exploring:
      tags:
        # Lean index — Status barely differentiates: only live ideas (idea /
        # considering) stay here; promoted/dropped exit the directory.
        exploring: {columns: [Idea, Apps, Summary]}
      entities:
        idea:
          # status: idea | considering | promoted | dropped — terminal exits
          # (promote / drop) move or delete the directory.
          path: <slug>
          frontmatter: [generated!, status!, summary!, apps!]

# ─────────────────────────────────────────────────────────────────────────
# meta — framework metadata and the project's component registry.
# ─────────────────────────────────────────────────────────────────────────
meta:
  # Valid values for the apps: frontmatter field. Add one entry per component
  # your monorepo ships. `platform` (cross-component) and `meta` (framework
  # plumbing) are reserved and must remain.
  apps:
    values:
      # <!-- llm:framework:apps:values -->
      # === project components — replace with your own ===
      # - webapp     # web-app/ component
      # - api        # api/ component
      # <!-- /llm:framework:apps:values -->
      # === reserved (do not remove) ===
      - platform
      - meta

  # Marker tags that live OUTSIDE the node tree (the root index.md tags —
  # components, root — now live on `root` above). These carry an explicit
  # host_file because it can't be derived from a node's path.
  tags:
    framework:
      apps:
        values: {host_file: schema.yaml, format: yaml-list}
    # Pattern tag — body is a bullet list of repo-relative paths. Used for aux
    # declarations and the handoff files block; can appear anywhere.
    files: {host_file: "*", format: path-list}

  # Cross-file checks across the .llm/ tree.
  #   implemented — run today by CLI commands (e.g. `llm regen <KEY>`).
  #   deferred    — not yet enforced by the validator.
  cross_file_checks:
    implemented:
      - "Intake refinement: no leftover raw-import block"
      - "Plan status and task progress (done/total)"
      - "Tasks marked done that lack a handoff-t<N>.md"
      - "Archive presence and finalization (no temp-archive-flow.delete-me.md residue)"
      - "Spec deltas integrity — each path in the plan's scope: lists the plan's key in its deltas:"
      - "EARS coverage — every intake AC line appears in archive/<KEY>/delta.md"
    deferred:
      - "Plan scope: paths resolve to existing specs/<area>[/<subarea>...]/<concern>.md"
      - "Task depends-on: references resolve to existing tasks in the same plan"
      - "Files listed in '## Files' of specs/<area>[/<subarea>...]/index.md exist on disk"
      - "deltas: in spec frontmatter reference existing archive/<PLAN-ID>/ entries"

  # Compatibility & versioning.
  compatibility:
    framework_version_field: framework-version
    framework_version_location: .llm/index.md
    rule:
      - The `framework-version:` field in .llm/index.md must equal the `version:` field in this schema.
      - The validator enforces equality.
      - Bumping `version:` here without bumping `framework-version:` surfaces an explicit mismatch error — that is the migration signal.
