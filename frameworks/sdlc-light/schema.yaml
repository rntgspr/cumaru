# ╔════════════════════════════════════════════════════════════════════════╗
# ║  HOW TO READ THIS SCHEMA — do not delete (LLM + humans rely on it)        ║
# ╚════════════════════════════════════════════════════════════════════════╝
#
# Root sections:
#   rules:    cross-cutting contracts every file / index satisfies.
#   root:     the .cumaru/ node tree. `root` is the top node; its children
#             (plans, specs, exploring) are the pillars. Every node shares
#             one shape { path?, frontmatter?, tags?, entities? } and nests
#             recursively.
#   meta:     framework metadata + this project's component registry.
#
# frontmatter:  a list of frontmatter keys. Suffix `!` = required, no suffix =
#               optional.  e.g. [key!, type, status!] -> key & status required.
#               `human_revised` is universal (rules.markdown) — never repeated.
#
# tags:  marker blocks `<!-- cumaru:NAME --> ... <!-- /cumaru:NAME -->`. The marker
#        NAME is the path through the node tree, colon-joined: a node's index
#        tag is just its key (-> cumaru:plans); a tag deeper in the tree joins the
#        ancestor keys (-> cumaru:plans:plan:handoff:files).
#
#        v4 — every tag body is a markdown table with TWO universal columns:
#
#          | Link                  | Description                              |
#          |-----------------------|------------------------------------------|
#          | [name](path/index.md) | one-line prose explaining the linked file |
#
#        Tag entries in the schema only declare routing hints:
#          host_file: <*.md|*>   -> explicit markdown host (only needed for tags
#                                  outside the node tree, e.g. meta.tags. Node
#                                  index tags derive host_file from the path
#                                  automatically).
#        Anything else (columns, format, description, number) is gone — the
#        shape is universal and hardcoded in the parser.
#
# path:  see the `root` section below — RELATIVE to the parent node; implicit =
#        the node's key; a directory path resolves to that dir's index.md.

version: 4
domain: sdlc-light

# ------------------------------------------------------------------
# rules — cross-cutting, not specific to any single pillar.
# ------------------------------------------------------------------
rules:
  markdown:
    required_heading: h1
    frontmatter: [human_revised!]

  index_md:
    frontmatter: [generated!, apps!]

  pillar_index:
    frontmatter: [generated!, generated-at!, apps!]

  ears:
    severity: warning
    pattern: "((WHEN|WHILE|WHERE|IF) .+ )?THE SYSTEM SHALL .+"
    applies_to:
      - plans — "## Acceptance Criteria (EARS)"
      - specs — "## Requirements (EARS)"

# ------------------------------------------------------------------
# root — the .cumaru/ tree.
# ------------------------------------------------------------------
root:
  path:
  frontmatter: [framework-version!, depends-on]
  tags: {}
  entities:
    plans:
      tags:
        plans: {}
      entities:
        plan:
          path: <PLAN-ID>
          frontmatter:
            [
              generated!,
              scope!,
              status!,
              summary!,
              apps!,
              key,
              type,
              epic,
              story,
              aux,
            ]
          entities:
            task:
              path: t<N>.md
              frontmatter:
                [
                  plan!,
                  task!,
                  depends-on!,
                  concerns!,
                  files!,
                  status!,
                  apps!,
                  aux!,
                ]
            handoff:
              path: handoff-t<N>.md
              frontmatter: [plan!, task!, status!, date!]
              tags:
                files: {}
            delta_draft:
              path: delta-draft.md
              frontmatter: [plan!, status!, date!]

    specs:
      tags:
        specs: {}
      entities:
        area:
          path: <area>
          frontmatter:
            [
              generated!,
              name!,
              summary!,
              depends-on!,
              relates,
              apps!,
              deltas,
              consolidated-at,
            ]
          entities:
            concern:
              path: <concern>.md
              frontmatter:
                [
                  generated!,
                  name!,
                  summary!,
                  depends-on!,
                  relates,
                  apps!,
                  deltas,
                  consolidated-at,
                ]

    exploring:
      tags:
        exploring: {}
      entities:
        idea:
          path: <slug>
          frontmatter: [generated!, status!, summary!, apps!]

# ------------------------------------------------------------------
# meta — framework metadata and the project's component registry.
# ------------------------------------------------------------------
meta:
  apps:
    values:
      # === project components — replace with your own ===
      # - webapp     # web-app/ component
      # - api        # api/ component
      # === reserved (do not remove) ===
      - platform
      - meta

  tags:
    components: { host_file: domain.md }
    root: { host_file: domain.md }
    files: { host_file: "*" }
    "files:touched": { host_file: "*" }
    templates: { host_file: "templates/index.md" }
    roles: { host_file: "roles/index.md" }
    # Spec→code reference tag — every row targets a repository SOURCE FILE,
    # resolved from the project root. Read by `cumaru coverage`.
    reference: { host_file: "*" }

  # Specification coverage (`cumaru coverage`) — the durable pillar whose
  # `reference` tables map spec files to repository source files.
  specification_dir: specs
  coverage:
    # fnmatch-style globs (`*` crosses `/`) narrowing which tracked files
    # count as coverable source. Empty = every tracked file. .cumaru/ and
    # .agents/ are always excluded.
    source: []
      # - "src/**"

  cross_file_checks:
    implemented:
      - "Plan status and task progress (done/total)"
      - "Tasks marked done that lack a handoff-t<N>.md"
      - "Spec deltas integrity — each path in the plan's scope lists the plan's key in its deltas"
      - "EARS coverage — every plan AC line appears in specs/ after absorption"
    deferred:
      - "Plan scope: paths resolve to existing specs/<area>[/<subarea>...]/<concern>.md"
      - "Task depends-on: references resolve to existing tasks in the same plan"
      - "Files listed in '## Files' of specs/<area>[/<subarea>...]/index.md exist on disk"
      - "deltas: in spec frontmatter reference existing plans/<PLAN-ID>/ entries"

  compatibility:
    framework_version_field: framework-version
    framework_version_location: .cumaru/index.md
    rule:
      - The `framework-version:` field in .cumaru/index.md must equal the `version:` field in this schema.
      - The validator enforces equality.
      - Bumping `version:` here without bumping `framework-version:` surfaces an explicit mismatch error — that is the migration signal.
