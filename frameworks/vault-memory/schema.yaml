# ╔════════════════════════════════════════════════════════════════════════╗
# ║  HOW TO READ THIS SCHEMA — do not delete (LLM + humans rely on it)        ║
# ╚════════════════════════════════════════════════════════════════════════╝
#
# Root sections:
#   rules:    cross-cutting contracts every file / index satisfies.
#   root:     the .cumaru/ node tree. `root` is the top node; its children
#             (inbox, drafts, memories, attachments) are the pillars. Every node
#             shares one shape { path?, frontmatter?, tags?, entities? } and
#             nests recursively.
#   meta:     framework metadata + this vault's memory domains.
#
# frontmatter:  a list of frontmatter keys. Suffix `!` = required, no suffix =
#               optional. e.g. [type!, last_update!] -> both are required.
#               `human_revised` is universal (rules.markdown) and is never
#               repeated below.
#
# tags:  marker blocks `<!-- cumaru:NAME --> ... <!-- /cumaru:NAME -->`. v4
#        makes every body a two-column markdown table:
#
#          | Link                  | Description                              |
#          |-----------------------|------------------------------------------|
#          | [name](path/index.md) | one-line prose explaining the linked file |
#
# path:  relative to the parent node. A directory path resolves to its index.md.

version: 4
domain: vault-memory

rules:
  markdown:
    required_heading: h1
    frontmatter: [human_revised!]

  index_md:
    frontmatter: [generated!, apps!]

  pillar_index:
    frontmatter: [generated!, generated-at!, apps!]

  ears:
    severity: warning
    pattern: "((WHEN|WHILE|WHERE|IF) .+ )?THE SYSTEM SHALL .+"
    applies_to: []

root:
  path:
  frontmatter: [framework-version!, depends-on]
  tags: {}
  entities:
    inbox:
      tags:
        inbox: {}
      entities:
        capture:
          path: <capture-id>
          frontmatter:
            [
              generated!,
              type!,
              captured-at!,
              last_update!,
              summary!,
              apps!,
              topics,
              source,
              attachments,
              relates,
            ]

    drafts:
      tags:
        drafts: {}
      entities:
        draft:
          path: <slug>
          frontmatter:
            [
              generated!,
              last_update!,
              summary!,
              apps!,
              topics,
              source,
              derived-from,
              relates,
              supports,
              contradicts,
              supersedes,
            ]

    memories:
      tags:
        memories: {}
      entities:
        memory:
          path: <slug>
          frontmatter:
            [
              generated!,
              type!,
              last_update!,
              confidence!,
              summary!,
              apps!,
              topics,
              source,
              references,
              derived-from,
              relates,
              supports,
              contradicts,
              supersedes,
              superseded-by,
              part-of,
              similar-to,
            ]
          tags:
            relations: {}

    attachments:
      tags:
        attachments: {}
      entities:
        attachment:
          path: <slug>
          frontmatter:
            [
              generated!,
              type!,
              captured-at!,
              last_update!,
              summary!,
              apps!,
              topics,
              source,
              retained-for,
              relates,
            ]

meta:
  apps:
    values:
      # Replace or extend these with the memory domains this vault uses.
      - personal
      - work
      - research
      - meta

  tags:
    components: { host_file: domain.md }
    root: { host_file: domain.md }
    roles: { host_file: "roles/index.md" }
    templates: { host_file: "templates/index.md" }
    files: { host_file: "*" }
    "files:touched": { host_file: "*" }
    relations: { host_file: "*" }

  specification_dir: memories
  coverage:
    source: []

  cross_file_checks:
    implemented: []
    deferred:
      - "Typed memory graph references resolve to existing memories, drafts, captures, or attachments."
      - "Attachment files named by retained-for/source fields exist on disk."

  compatibility:
    framework_version_field: framework-version
    framework_version_location: .cumaru/index.md
    rule:
      - The `framework-version:` field in .cumaru/index.md must equal the `version:` field in this schema.
      - The validator enforces equality.
