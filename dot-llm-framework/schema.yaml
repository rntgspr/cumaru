# Canonical schema for .llm/ entities.
# Read by `llm doctor` (logic in src/cmd_doctor.sh).
# Editing this file is editing the framework's contract — keep src/cmd_doctor.sh in sync.

version: 2

# Universal rules
universal:
  # Every markdown file must have at least one H1 heading.
  # `purpose:` was removed — the H1 is the canonical "what is this".
  # `human_revised:` is required everywhere — defaults to `false`; flip to
  # `true` after a human eyeballs the file end-to-end.
  markdown:
    required_heading: h1
    required_frontmatter: [human_revised]

  # Every index.md must carry these frontmatter fields (in addition to the
  # universal markdown requirements above).
  index_md:
    required: [generated, apps]

# Valid values for the apps: field (frontmatter)
#
# Add one entry per component your monorepo ships. The two reserved keys —
# `platform` (monorepo-level) and `meta` (framework metadata) — must remain.
apps:
  values:
    # <!-- llm:custom:apps-values -->
    # === project components — replace with your own ===
    # - webapp     # web-app/ component
    # - api        # api/ component
    # - mobile     # mobile/ component
    # <!-- /llm:custom:apps-values -->
    # === reserved (do not remove) ===
    - platform   # monorepo-level (cross-component infrastructure or process)
    - meta       # framework metadata (.llm/ plumbing); never for product/system content

# Per-entity rules
entities:

  plan:
    path: plans/<PLAN-ID>/index.md
    required:
      - generated      # always: false
      - apps
      - status         # drafting | in-progress | blocked | done
      - summary
      - scope          # list of <area>[/<subarea>...]/<concern> paths under specs/
    optional:
      - jira
      - type           # task | bug | spike | story
      - epic
      - story
      - aux

  task:
    path: plans/<PLAN-ID>/t<N>.md
    required:
      - plan           # plan id (Jira or slug)
      - task           # T<N>
      - depends-on     # list, possibly empty
      - concerns       # list, possibly empty
      - files          # list, possibly empty (Lead's prediction; not exhaustive)
      - status         # pending | in-progress | done | blocked
      - apps
      - aux

  handoff:
    path: plans/<PLAN-ID>/handoff-t<N>.md
    required:
      - plan
      - task
      - status         # complete | partial | blocked
      - date

  delta_draft:
    path: plans/<PLAN-ID>/delta-draft.md
    required:
      - plan
      - status         # always: draft
      - date

  spec_area:
    # Areas may nest as subareas of arbitrary depth; the directory carrying
    # an index.md is always a spec area, whether at specs/<area>/ or
    # specs/<area>/<subarea>/ or deeper.
    path: specs/<area>[/<subarea>...]/index.md
    required:
      - generated      # always: false
      - apps
      - name
      - summary
      - depends-on     # list of <area> paths
      - deltas         # list of plan IDs whose deltas built the current state

  spec_concern:
    # A concern sits beside the index.md of an area or subarea, at any depth.
    path: specs/<area>[/<subarea>...]/<concern>.md (not index.md)
    required:
      - generated      # always: false
      - apps
      - name
      - summary
      - depends-on     # list of <area> paths
      - deltas         # list of plan IDs whose deltas built the current state

  exploring_idea:
    path: exploring/<slug>/index.md
    required:
      - generated      # always: false
      - status         # idea | considering — terminal exits (Promote, Drop) move or delete the directory; see exploring/index.md "Lifecycle of an exploration"
      - apps
      - summary

  intake_ticket:
    path: intake/tickets/<KEY>/index.md
    required: [generated, jira, type, status, synced-at, apps]

  intake_story:
    path: intake/stories/<KEY>/index.md
    required: [generated, jira, type, status, synced-at, apps]

  intake_epic:
    path: intake/epics/<KEY>/index.md
    required: [generated, jira, type, status, synced-at, apps]

  archive_plan:
    path: archive/<PLAN-ID>/index.md
    required:
      - generated      # always: false
      - status         # always: done
      - summary
      - apps
    optional:
      - jira
      - completed-at
      - delta          # path to delta.md (relative)
      - consolidated

  delta_finalized:
    path: archive/<PLAN-ID>/delta.md
    required:
      - plan           # plan ID (Jira or slug)
      - date           # ISO date of finalization
    optional:
      - apps           # often platform-only when the delta is cross-component

  review:
    path: reviews/<PLAN-ID>-review.md
    required:
      - plan           # plan ID being reviewed
      - apps
    optional:
      - reviewer       # name or role
      - date
      - status         # pending | accepted | rejected

  generated_index:
    paths:
      - intake/index.md
      - plans/index.md
      - archive/index.md
      - specs/index.md
      - exploring/index.md
    required:
      - generated      # always: true
      - generated-at   # ISO datetime
      - apps           # always: [meta]

# Soft rules — warnings only, do not fail validation
soft_rules:

  ears:
    description: |
      Bullet items under "## Acceptance Criteria (EARS)" in intake tickets and
      slug-based plans, and under "## Requirements (EARS)" in specs, should
      match the EARS pattern. Free prose is allowed in narrative sections —
      this check only inspects explicit acceptance/requirement sections.

      For Jira-backed plans the AC lives in intake/tickets/<KEY>/index.md;
      the plan body does not repeat it. For slug-based plans (no Jira) the AC
      lives in the plan body.
    pattern: 'WHEN .+ THE SYSTEM SHALL .+'
    applies_to:
      - intake/tickets/<KEY>/index.md (## Acceptance Criteria section)
      - plans/<PLAN-ID>/index.md (## Acceptance Criteria section, slug-based plans only)
      - specs/<area>[/<subarea>...]/index.md (## Requirements section)

# Marker tags inside .llm/ files. Each declares the format and placement
# rules for `<!-- llm:NAME -->` blocks (NAME being a single token like
# `intake` or, for pattern-based tags, a `kind:tag` pair like `files:touched`).
# Tags appear **immediately after the YAML frontmatter, before any prose**
# (including the `# H1`). The frontmatter is the stable anchor; prose is
# framework-owned and may be rewritten between versions. Project-owned
# content lives inside the markers, above the prose, so it survives
# `llm sync` regardless of how the framework's narrative evolves.
tags:
  # Pillar entries — table of what exists in each pillar; regenerated by
  # `llm regen index [pillar]` from disk; preserved verbatim by `llm sync`.
  intake:
    host_file: intake/index.md
    placement: after-frontmatter
    format: markdown-table
    columns: [Key, Type, Title, Epic, Story, Status, Synced]
  plans:
    host_file: plans/index.md
    placement: after-frontmatter
    format: markdown-table
    columns: [Plan, Title, Scope, Tasks, Status, Apps, Updated]
  archive:
    host_file: archive/index.md
    placement: after-frontmatter
    format: markdown-table
    columns: [Plan, Type, Apps, Story, Epic, Completed, Summary]
  specs:
    host_file: specs/index.md
    placement: after-frontmatter
    format: markdown-table
    columns: [Path, Summary, Apps, Depends-on]
  exploring:
    host_file: exploring/index.md
    placement: after-frontmatter
    format: markdown-table
    columns: [Idea, Status, Apps, Updated, Summary]

  # Customs — project-edited content; preserved verbatim by `llm sync`.
  components:
    host_file: index.md
    placement: after-frontmatter
    format: markdown-table
    columns: [Key, Folder, Stack/Notes]
  root:
    host_file: index.md
    placement: after-frontmatter
    format: free-text
  "custom:apps-values":
    host_file: schema.yaml
    placement: inline-yaml
    format: yaml-list-of-strings

  # Pattern tags — two-token names `<kind>:<tag>` where the body is a list
  # of repo-relative paths. Used in templates (e.g. `files:touched` in
  # handoff.md) and in entity files that declare aux paths checked by
  # `llm doctor`'s file-references pass.
  "files:*":
    placement: anywhere
    format: markdown-bullet-list
    item_pattern: "- `<path>`"

# Framework sync configuration — read by `llm sync`.
#
# Two categories define how files inside .llm/ behave on sync:
#   - framework_files: replaced wholesale on sync.
#   - marked_files:    files where any `<!-- llm:NAME -->` block found
#                      in the target is preserved; everything outside the
#                      markers is replaced from the source. The set of tags
#                      is auto-detected per file — no per-file declaration.
#
# Files NOT listed below are project-owned and never touched. Reviews under
# reviews/<plan>-review.md are project-owned by exclusion.
#
# Updates to the `llm` CLI script and src/*.sh files are out of scope for
# this command — they live outside .llm/ and are the responsibility of
# whoever maintains the dot-llm checkout (typically a `git pull` on the
# global symlink path). The `llm-cli` skill describes how to do that.
sync:
  framework_files:
    - templates/any-index.md
    - templates/bootstrap.md
    - templates/delta-draft.md
    - templates/delta.md
    - templates/exploration.md
    - templates/handoff.md
    - templates/index.md
    - templates/intake-epic.md
    - templates/intake-story.md
    - templates/intake-ticket.md
    - templates/plan.md
    - templates/review.md
    - templates/spec.md
    - templates/task.md
    - roles/index.md
    - roles/dev.md
    - roles/ghost.md
    - roles/lead.md
    - reviews/index.md

  marked_files:
    # Files whose `<!-- llm:NAME -->` blocks are preserved across sync.
    # Kinds in use: `custom` (project edits), `entries` (regenerable indexes).
    - index.md
    - schema.yaml
    - intake/index.md
    - plans/index.md
    - archive/index.md
    - specs/index.md
    - exploring/index.md

# Cross-file checks across the .llm/ tree.
#
# `implemented` runs as part of CLI commands today (e.g. `llm regen <JIRA-KEY>`).
# `deferred` describes checks the validator does not yet enforce — landing in a
# future version of `llm doctor`.
cross_file_checks:
  implemented:
    # Pointwise (per Jira key), via `llm regen <JIRA-KEY>`:
    - "Intake refinement: no leftover <!-- BEGIN JIRA-RAW --> block"
    - "Plan status and task progress (done/total)"
    - "Tasks marked done that lack a handoff-t<N>.md"
    - "Archive presence and finalization (no temp-archive-flow.delete-me.md residue)"
    - "Spec deltas: integrity — each path in the plan's scope: has the plan's <KEY> in its deltas: list"
    - "EARS coverage — every intake AC line appears in archive/<KEY>/delta.md"
  deferred:
    # Global tree-wide checks not yet implemented:
    - "Plan scope: paths resolve to existing specs/<area>[/<subarea>...]/<concern>.md"
    - "Task depends-on: references resolve to existing tasks in the same plan"
    - "Files listed in '## Files' of specs/<area>[/<subarea>...]/index.md exist on disk"
    - "deltas: in spec frontmatter reference existing archive/<PLAN-ID>/ entries"

# Compatibility & versioning
compatibility:
  framework_version_field: framework-version
  framework_version_location: .llm/index.md
  rule: |
    The `framework-version:` field in .llm/index.md must equal the `version:`
    field in this schema. The validator (llm.sh) enforces equality. Bumping
    `version:` here without bumping `framework-version:` in the project's
    .llm/index.md surfaces an explicit mismatch error — that is the migration
    signal.
